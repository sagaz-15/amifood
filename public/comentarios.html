<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sugerencias - AmiFood</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-inner">
      <a href="index.html" class="logo-link">
        <img src="img/amifood.png" alt="AmiFood" class="logo-img">
        <span class="logo-text">Ami<span>Food</span>'S</span>
      </a>
      <button class="mobile-toggle" id="menu-toggle" aria-label="Menú">☰</button>
      <nav class="main-nav" id="main-nav">
        <a href="index.html">Inicio</a>
        <a href="consulp.html">Consultar Precios</a>
        <a href="comentarios.html" class="active">Sugerencias</a>
        <a href="contactos.html">Contacto</a>
        <a href="login.html" class="store-link">Tienda</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="form-page">
      <div class="form-card">
        <h1>Danos tu opinión</h1>
        <p class="form-subtitle">Tus sugerencias nos ayudan a mejorar</p>

        <form action="https://formsubmit.co/amifooduni@gmail.com" method="POST">
          <div class="form-group">
            <label for="Nombre">Nombre</label>
            <input type="text" id="Nombre" name="Nombre" placeholder="Tu nombre" required>
          </div>
          <div class="form-group">
            <label for="Correo">Correo electrónico</label>
            <input type="email" id="Correo" name="Correo" placeholder="correo@ejemplo.com" required>
          </div>
          <div class="form-group">
            <label for="Comentario">Comentario</label>
            <textarea id="Comentario" name="Comentario" placeholder="Escribe aquí tu comentario..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Enviar sugerencia</button>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <p>AmiFood'S &mdash; Buscador de precios para la comunidad universitaria</p>
  </footer>

  <script>
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('main-nav').classList.toggle('open');
    });
  </script>
</body>
</html>
