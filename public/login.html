<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - AmiFood</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-inner">
      <a href="index.html" class="logo-link">
        <img src="img/amifood.png" alt="AmiFood" class="logo-img">
        <span class="logo-text">Ami<span>Food</span>'S</span>
      </a>
      <button class="mobile-toggle" id="menu-toggle" aria-label="Menú">☰</button>
      <nav class="main-nav" id="main-nav">
        <a href="index.html">Inicio</a>
        <a href="consulp.html">Consultar Precios</a>
        <a href="comentarios.html">Sugerencias</a>
        <a href="contactos.html">Contacto</a>
        <a href="login.html" class="store-link active">Tienda</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="form-page">
      <div class="form-card">
        <h1>Acceso Tiendas</h1>
        <p class="form-subtitle">Ingresa para administrar tus productos y precios</p>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="correo@amifood.com" required>
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
          </div>
          <div id="form-error" class="form-error"></div>
          <button type="submit" class="btn btn-primary" id="login-btn">Ingresar</button>
        </form>

        <div class="form-footer">
          <a href="index.html">← Volver al inicio</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>AmiFood'S &mdash; Buscador de precios para la comunidad universitaria</p>
  </footer>

  <script>
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('main-nav').classList.toggle('open');
    });

    document.addEventListener('DOMContentLoaded', function() {
      const token = localStorage.getItem('token');
      if (token) {
        fetch('/api/health', { headers: { 'Authorization': 'Bearer ' + token } })
          .then(r => { if (r.ok) window.location.href = 'dashboard.html'; })
          .catch(() => {});
      }

      document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('form-error');
        const submitBtn = document.getElementById('login-btn');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Ingresando...';
        errorDiv.style.display = 'none';

        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        })
        .then(r => r.json())
        .then(data => {
          if (data.token) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('storeName', data.store.name);
            localStorage.setItem('storeId', data.store.id);
            window.location.href = 'dashboard.html';
          } else {
            errorDiv.textContent = data.error || 'Error al iniciar sesión';
            errorDiv.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Ingresar';
          }
        })
        .catch(() => {
          errorDiv.textContent = 'Error de conexión con el servidor';
          errorDiv.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Ingresar';
        });
      });
    });
  </script>
</body>
</html>
