<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar Precios - AmiFood</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-inner">
      <a href="index.html" class="logo-link">
        <img src="img/amifood.png" alt="AmiFood" class="logo-img">
        <span class="logo-text">Ami<span>Food</span>'S</span>
      </a>
      <button class="mobile-toggle" id="menu-toggle" aria-label="Menú">☰</button>
      <nav class="main-nav" id="main-nav">
        <a href="index.html">Inicio</a>
        <a href="consulp.html" class="active">Consultar Precios</a>
        <a href="comentarios.html">Sugerencias</a>
        <a href="contactos.html">Contacto</a>
        <a href="login.html" class="store-link">Tienda</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="search-container">
      <h1>Buscar productos por <span style="color: var(--accent);">precio</span></h1>
      <p class="subtitle">Ingresa cuánto dinero tienes para gastar y te mostraremos lo que puedes comprar</p>

      <form id="search-form" class="search-box">
        <input type="number" id="price" name="price" min="0" step="100" placeholder="Ej: 5000" required>
        <button type="submit" class="btn btn-primary">Buscar</button>
      </form>

      <div id="results" class="results-grid"></div>
    </section>
  </main>

  <footer>
    <p>AmiFood'S &mdash; Buscador de precios para la comunidad universitaria</p>
  </footer>

  <script src="js/script.js"></script>
  <script>
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('main-nav').classList.toggle('open');
    });
  </script>
</body>
</html>
