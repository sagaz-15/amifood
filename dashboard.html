<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - AmiFood</title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Mooli&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #0d3753;
            border: 3px solid #d49c21;
            border-radius: 10px;
            margin: 10px auto;
            max-width: 1200px;
        }
        .dashboard-header h1 {
            color: #d49c21;
            font-family: 'Playfair Display', serif;
            font-size: 2em;
        }
        .dashboard-header .store-name {
            color: #c6cbce;
            font-size: 1.5em;
        }
        .btn-logout {
            background-color: #c0392b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 7px;
            font-size: 1.3em;
            font-family: 'Mooli', sans-serif;
            cursor: pointer;
        }
        .btn-logout:hover {
            background-color: #e74c3c;
        }
        .dashboard-content {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .add-product-form {
            background-color: #0d3753;
            border: 3px solid #d49c21;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .add-product-form h3 {
            color: #d49c21;
            font-size: 1.8em;
            margin-bottom: 15px;
            font-family: 'Playfair Display', serif;
        }
        .add-product-form .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .add-product-form .form-group {
            flex: 1;
            min-width: 150px;
        }
        .add-product-form .form-group label {
            display: block;
            color: #c6cbce;
            font-size: 1.2em;
            margin-bottom: 5px;
        }
        .add-product-form .form-group input {
            width: 100%;
            padding: 8px;
            border: 2px solid #d49c21;
            border-radius: 7px;
            background-color: #283847;
            color: #c6cbce;
            font-size: 1.2em;
            box-sizing: border-box;
        }
        .add-product-form .form-group input:focus {
            outline: none;
            border-color: #dda62e;
        }
        .btn-add {
            padding: 8px 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 1.3em;
            font-family: 'Mooli', sans-serif;
            cursor: pointer;
            height: 38px;
        }
        .btn-add:hover {
            background-color: #2ecc71;
        }
        .products-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #0d3753;
            border: 3px solid #d49c21;
            border-radius: 10px;
            overflow: hidden;
        }
        .products-table th {
            background-color: #d49c21;
            color: #0d3753;
            padding: 12px;
            font-size: 1.3em;
            text-align: left;
        }
        .products-table td {
            padding: 10px 12px;
            color: #c6cbce;
            font-size: 1.2em;
            border-bottom: 1px solid #1a4a6b;
        }
        .products-table tr:hover {
            background-color: #154c70;
        }
        .products-table .actions {
            display: flex;
            gap: 8px;
        }
        .btn-edit {
            padding: 5px 12px;
            background-color: #d49c21;
            color: #0d3753;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
        }
        .btn-edit:hover {
            background-color: #dda62e;
        }
        .btn-delete {
            padding: 5px 12px;
            background-color: #c0392b;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
        }
        .btn-delete:hover {
            background-color: #e74c3c;
        }
        .btn-save {
            padding: 5px 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
        }
        .btn-save:hover {
            background-color: #2ecc71;
        }
        .btn-cancel {
            padding: 5px 12px;
            background-color: #7f8c8d;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
        }
        .btn-cancel:hover {
            background-color: #95a5a6;
        }
        .edit-input {
            width: 100%;
            padding: 5px;
            border: 2px solid #d49c21;
            border-radius: 5px;
            background-color: #283847;
            color: #c6cbce;
            font-size: 1.1em;
            box-sizing: border-box;
        }
        .available-badge {
            color: #27ae60;
            font-weight: bold;
        }
        .unavailable-badge {
            color: #e74c3c;
            font-weight: bold;
        }
        .toggle-btn {
            padding: 3px 10px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
        }
        .toggle-on {
            background-color: #27ae60;
            color: white;
        }
        .toggle-off {
            background-color: #e74c3c;
            color: white;
        }
        .success-message {
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            border-radius: 7px;
            margin-bottom: 15px;
            font-size: 1.3em;
            display: none;
        }
        .error-message {
            background-color: #c0392b;
            color: white;
            padding: 10px 20px;
            border-radius: 7px;
            margin-bottom: 15px;
            font-size: 1.3em;
            display: none;
        }
        .empty-message {
            color: #7a7c7e;
            font-size: 1.5em;
            text-align: center;
            padding: 40px;
        }
        .price-col {
            min-width: 100px;
        }
    </style>
</head>
<body class="tamañoajustale">
    <div class="dashboard-header">
        <h1>AmiFood - Panel de Control</h1>
        <div>
            <span class="store-name" id="store-name-display"></span>
            <button class="btn-logout" id="btn-logout">Cerrar Sesión</button>
        </div>
    </div>

    <div class="dashboard-content">
        <div id="success-message" class="success-message"></div>
        <div id="error-message" class="error-message"></div>

        <div class="add-product-form">
            <h3>Agregar Nuevo Producto</h3>
            <form id="add-product-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="product-name">Nombre del Producto</label>
                        <input type="text" id="product-name" required placeholder="Ej: Perro caliente">
                    </div>
                    <div class="form-group">
                        <label for="product-price">Precio ($)</label>
                        <input type="number" id="product-price" required min="0" step="100" placeholder="Ej: 5000">
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label for="product-description">Descripción (opcional)</label>
                        <input type="text" id="product-description" placeholder="Ej: Perro caliente con salsa de la casa">
                    </div>
                    <button type="submit" class="btn-add">Agregar</button>
                </div>
            </form>
        </div>

        <h2 style="color: #d49c21; font-family: 'Playfair Display', serif; font-size: 1.8em; margin-bottom: 15px;">
            Mis Productos
        </h2>

        <table class="products-table" id="products-table">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Disponible</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="products-tbody">
                <tr>
                    <td colspan="4" class="empty-message">Cargando productos...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
            return;
        }

        document.getElementById('store-name-display').textContent = localStorage.getItem('storeName') || 'Tienda';

        function showSuccess(msg) {
            const el = document.getElementById('success-message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function apiFetch(url, options = {}) {
            const headers = {
                'Authorization': 'Bearer ' + token,
                ...options.headers
            };
            if (!(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            return fetch(url, { ...options, headers });
        }

        function loadProducts() {
            const tbody = document.getElementById('products-tbody');
            tbody.innerHTML = '<tr><td colspan="4" class="empty-message">Cargando productos...</td></tr>';

            apiFetch('/api/products')
                .then(r => {
                    if (r.status === 401) {
                        localStorage.clear();
                        window.location.href = 'login.html';
                        return;
                    }
                    return r.json();
                })
                .then(products => {
                    if (!Array.isArray(products) || products.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="empty-message">No tienes productos registrados. ¡Agrega tu primer producto!</td></tr>';
                        return;
                    }

                    tbody.innerHTML = '';
                    products.forEach(p => {
                        const tr = document.createElement('tr');
                        tr.id = 'product-row-' + p.id;
                        tr.innerHTML = `
                            <td class="product-name-cell" data-id="${p.id}">${p.name}</td>
                            <td class="product-price-cell" data-id="${p.id}">$${parseFloat(p.price).toLocaleString('es-CO')}</td>
                            <td>
                                <span class="${p.is_available ? 'available-badge' : 'unavailable-badge'}">
                                    ${p.is_available ? 'Disponible' : 'No disponible'}
                                </span>
                                <button class="toggle-btn ${p.is_available ? 'toggle-off' : 'toggle-on'}"
                                        onclick="toggleAvailability(${p.id}, ${p.is_available ? 0 : 1})">
                                    ${p.is_available ? 'Desactivar' : 'Activar'}
                                </button>
                            </td>
                            <td class="actions">
                                <button class="btn-edit" onclick="editProduct(${p.id})">Editar</button>
                                <button class="btn-delete" onclick="deleteProduct(${p.id})">Eliminar</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-message">Error al cargar productos</td></tr>';
                    showError('Error al cargar productos');
                });
        }

        window.toggleAvailability = function(productId, newStatus) {
            const row = document.getElementById('product-row-' + productId);
            const name = row.querySelector('.product-name-cell').textContent;
            const priceText = row.querySelector('.product-price-cell').textContent;
            const price = parseFloat(priceText.replace(/[^0-9]/g, ''));

            apiFetch('/api/products/' + productId, {
                method: 'PUT',
                body: JSON.stringify({ name, price, is_available: newStatus === 1 })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    showSuccess('Estado de disponibilidad actualizado');
                    loadProducts();
                }
            })
            .catch(() => showError('Error al actualizar disponibilidad'));
        };

        window.editProduct = function(productId) {
            const row = document.getElementById('product-row-' + productId);
            const nameCell = row.querySelector('.product-name-cell');
            const priceCell = row.querySelector('.product-price-cell');

            const currentName = nameCell.textContent;
            const currentPrice = parseFloat(priceCell.textContent.replace(/[^0-9]/g, ''));

            nameCell.innerHTML = `<input type="text" class="edit-input" id="edit-name-${productId}" value="${currentName}">`;
            priceCell.innerHTML = `<input type="number" class="edit-input" id="edit-price-${productId}" value="${currentPrice}" min="0" step="100">`;

            const actionsCell = row.querySelector('.actions');
            actionsCell.innerHTML = `
                <button class="btn-save" onclick="saveProduct(${productId})">Guardar</button>
                <button class="btn-cancel" onclick="loadProducts()">Cancelar</button>
            `;
        };

        window.saveProduct = function(productId) {
            const name = document.getElementById('edit-name-' + productId).value.trim();
            const price = document.getElementById('edit-price-' + productId).value;

            if (!name || !price) {
                showError('Nombre y precio son requeridos');
                return;
            }

            apiFetch('/api/products/' + productId, {
                method: 'PUT',
                body: JSON.stringify({ name, price: parseFloat(price) })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    showSuccess('Producto actualizado exitosamente');
                    loadProducts();
                }
            })
            .catch(() => showError('Error al guardar producto'));
        };

        window.deleteProduct = function(productId) {
            if (!confirm('¿Estás seguro de eliminar este producto?')) return;

            apiFetch('/api/products/' + productId, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    showSuccess('Producto eliminado exitosamente');
                    loadProducts();
                }
            })
            .catch(() => showError('Error al eliminar producto'));
        };

        document.getElementById('add-product-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('product-name').value.trim();
            const price = document.getElementById('product-price').value;
            const description = document.getElementById('product-description').value.trim();

            if (!name || !price) {
                showError('Nombre y precio son requeridos');
                return;
            }

            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Agregando...';

            apiFetch('/api/products', {
                method: 'POST',
                body: JSON.stringify({ name, price: parseFloat(price), description: description || null })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    showSuccess('Producto agregado exitosamente');
                    document.getElementById('add-product-form').reset();
                    loadProducts();
                }
                submitBtn.disabled = false;
                submitBtn.textContent = 'Agregar';
            })
            .catch(() => {
                showError('Error al agregar producto');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Agregar';
            });
        });

        document.getElementById('btn-logout').addEventListener('click', function() {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        loadProducts();
    });
    </script>
</body>
</html>
