<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - AmiFood</title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Mooli&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background-color: #0d3753;
            border: 3px solid #d49c21;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .login-container h2 {
            color: #d49c21;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #c6cbce;
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #d49c21;
            border-radius: 7px;
            background-color: #283847;
            color: #c6cbce;
            font-size: 1.3em;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #dda62e;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #d49c21;
            color: #0d3753;
            border: none;
            border-radius: 7px;
            font-size: 1.5em;
            font-family: 'Mooli', sans-serif;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-login:hover {
            background-color: #dda62e;
        }
        .error-message {
            color: #ff6b6b;
            text-align: center;
            font-size: 1.3em;
            margin-top: 10px;
            display: none;
        }
        .store-info {
            text-align: center;
            color: #7a7c7e;
            font-size: 1.2em;
            margin-top: 20px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #d49c21;
            font-size: 1.3em;
            text-decoration: none;
        }
        .back-link:hover {
            color: #dda62e;
        }
    </style>
</head>
<body class="tamañoajustale">
    <div class="menu container">
        <center>
            <img src="img/amifood.png" height="250" width="370" class="logo">
        </center>
    </div>

    <center>
    <nav class="navbar">
        <ul>
            <li><a href="index.html" class="barra">Inicio</a></li>
            <li><a href="consulp.html" class="barra">consulta precios</a></li>
            <li><a href="comentarios.html" class="barra">sugerencias</a></li>
            <li><a href="contactos.html" class="barra">Contacto</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <h2>Iniciar Sesión - Tienda</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="correo@amifood.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña">
            </div>
            <button type="submit" class="btn-login">Ingresar</button>
        </form>
        <div id="error-message" class="error-message"></div>
        <div class="store-info">
            <p>Acceso exclusivo para tiendas asociadas</p>
        </div>
        <a href="index.html" class="back-link">← Volver al inicio</a>
    </div>
    </center>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('token');
        if (token) {
            fetch('/api/health', {
                headers: { 'Authorization': 'Bearer ' + token }
            }).then(r => {
                if (r.ok) window.location.href = 'dashboard.html';
            }).catch(() => {});
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const submitBtn = this.querySelector('button[type="submit"]');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Ingresando...';
            errorDiv.style.display = 'none';

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('storeName', data.store.name);
                    localStorage.setItem('storeId', data.store.id);
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Error al iniciar sesión';
                    errorDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Ingresar';
                }
            })
            .catch(err => {
                errorDiv.textContent = 'Error de conexión con el servidor';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ingresar';
            });
        });
    });
    </script>
</body>
</html>
